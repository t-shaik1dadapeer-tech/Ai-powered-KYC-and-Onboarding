version: 2
updates:
  - package-ecosystem: pip
    directory: /services/onboarding-api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /clients/node-cli
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: cargo
    directory: /engines/rust-analyzer
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
