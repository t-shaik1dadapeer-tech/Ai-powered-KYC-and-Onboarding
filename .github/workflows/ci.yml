name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Ruff (Python)
        run: |
          pip install ruff==0.8.6
          ruff check services/onboarding-api/app services/onboarding-api/tests
          ruff check engines/intelligence/src engines/intelligence/tests

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: clients/node-cli/package-lock.json

      - name: Node syntax check
        working-directory: clients/node-cli
        run: |
          npm ci
          npm run lint

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust fmt + clippy
        working-directory: engines/rust-analyzer
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings

  test-onboarding-api:
    name: Test — onboarding-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: services/onboarding-api
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Pytest + coverage
        working-directory: services/onboarding-api
        run: |
          PYTHONPATH=. pytest -q --cov=app --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - uses: actions/upload-artifact@v4
        with:
          name: onboarding-api-coverage
          path: services/onboarding-api/coverage.xml
          retention-days: 14

  test-intelligence:
    name: Test — intelligence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: engines/intelligence
        run: |
          pip install pydantic pytest pytest-cov ruff

      - name: Pytest + coverage
        working-directory: engines/intelligence
        run: |
          PYTHONPATH=src pytest -q --cov=intelligence --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - uses: actions/upload-artifact@v4
        with:
          name: intelligence-coverage
          path: engines/intelligence/coverage.xml
          retention-days: 14

  test-node-cli:
    name: Test — node-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install intelligence deps (generate-report test)
        run: pip install pydantic

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: clients/node-cli/package-lock.json

      - name: npm test
        working-directory: clients/node-cli
        run: |
          npm ci
          npm test

  test-rust-analyzer:
    name: Test — rust-analyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo test + release build
        working-directory: engines/rust-analyzer
        run: |
          cargo test -q
          cargo build --release -q

      - uses: actions/upload-artifact@v4
        with:
          name: rust-analyzer-release
          path: engines/rust-analyzer/target/release/rust-analyzer
          retention-days: 7

  test-e2e:
    name: Test — platform E2E
    runs-on: ubuntu-latest
    needs: [test-onboarding-api, test-intelligence, test-rust-analyzer]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python deps
        run: |
          pip install -r services/onboarding-api/requirements.txt
          pip install pytest httpx fastapi pydantic

      - name: Build rust-analyzer
        working-directory: engines/rust-analyzer
        run: cargo build --release -q

      - name: Platform E2E
        run: |
          cd services/onboarding-api
          PYTHONPATH=. pytest -q ../../tests/e2e/test_platform_e2e.py

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test-onboarding-api, test-intelligence, test-node-cli, test-rust-analyzer, test-e2e]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compose build
        working-directory: infra/docker
        run: |
          docker compose build 2>&1 | tee docker-build.log
          docker compose config > docker-compose-resolved.yml

      - uses: actions/upload-artifact@v4
        with:
          name: docker-build-evidence
          path: |
            infra/docker/docker-build.log
            infra/docker/docker-compose-resolved.yml
          retention-days: 14

  infra-validate:
    name: Infra validate (Terraform + K8s + load)
    runs-on: ubuntu-latest
    needs: [test-onboarding-api]
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform init/validate/apply
        run: bash scripts/terraform-verify.sh

      - uses: azure/setup-kubectl@v4

      - name: Kubernetes dry-run
        run: bash scripts/k8s-verify.sh

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Load test
        working-directory: services/onboarding-api
        run: |
          pip install -r requirements.txt
          pip install httpx pytest-asyncio
          bash ../../scripts/load-test.sh

      - uses: actions/upload-artifact@v4
        with:
          name: infra-validate-evidence
          path: |
            evidence/terraform-results/
            evidence/k8s-results/
            evidence/performance/
          retention-days: 14

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-onboarding-api
      - test-intelligence
      - test-node-cli
      - test-rust-analyzer
      - test-e2e
      - docker-build
      - infra-validate
    if: always()
    steps:
      - name: Write summary
        run: |
          {
            echo "# CI Pipeline Summary"
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| lint | ${{ needs.lint.result }} |"
            echo "| test-onboarding-api | ${{ needs.test-onboarding-api.result }} |"
            echo "| test-intelligence | ${{ needs.test-intelligence.result }} |"
            echo "| test-node-cli | ${{ needs.test-node-cli.result }} |"
            echo "| test-rust-analyzer | ${{ needs.test-rust-analyzer.result }} |"
            echo "| test-e2e | ${{ needs.test-e2e.result }} |"
            echo "| docker-build | ${{ needs.docker-build.result }} |"
            echo "| infra-validate | ${{ needs.infra-validate.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any required job failed
        if: |
          needs.lint.result != 'success' ||
          needs.test-onboarding-api.result != 'success' ||
          needs.test-intelligence.result != 'success' ||
          needs.test-node-cli.result != 'success' ||
          needs.test-rust-analyzer.result != 'success' ||
          needs.test-e2e.result != 'success' ||
          needs.docker-build.result != 'success' ||
          needs.infra-validate.result != 'success'
        run: exit 1
