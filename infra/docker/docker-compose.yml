services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kyc
      POSTGRES_PASSWORD: kyc
      POSTGRES_DB: kyc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyc -d kyc"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kyc-net

  onboarding-api:
    build:
      context: ../../services/onboarding-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://kyc:kyc@postgres:5432/kyc
      LOG_LEVEL: INFO
    ports:
      - "${API_HOST_PORT:-8101}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - kyc-net

  node-cli:
    build:
      context: ../../clients/node-cli
      dockerfile: Dockerfile
    environment:
      API_BASE_URL: http://onboarding-api:8000
    depends_on:
      onboarding-api:
        condition: service_healthy
    profiles:
      - tools
    networks:
      - kyc-net
    entrypoint: ["tail", "-f", "/dev/null"]

  rust-analyzer:
    build:
      context: ../../engines/rust-analyzer
      dockerfile: Dockerfile
    volumes:
      - ../../:/workspace:ro
    profiles:
      - tools
    networks:
      - kyc-net

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_HOST_PORT:-9191}:9090"
    depends_on:
      onboarding-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - kyc-net

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${BUNDLED_GRAFANA_PORT:-3003}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - kyc-net

volumes:
  postgres_data:

networks:
  kyc-net:
    driver: bridge
