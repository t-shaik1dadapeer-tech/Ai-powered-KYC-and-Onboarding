# onboarding-api Deployment — apply with kyc-platform.yaml
# docker build -t onboarding-api:local services/onboarding-api
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onboarding-api
  namespace: kyc-platform
  labels:
    app: onboarding-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onboarding-api
  template:
    metadata:
      labels:
        app: onboarding-api
    spec:
      containers:
        - name: onboarding-api
          image: onboarding-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: onboarding-api-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: onboarding-api-secrets
                  key: database_url
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: onboarding-api
  namespace: kyc-platform
spec:
  selector:
    app: onboarding-api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
